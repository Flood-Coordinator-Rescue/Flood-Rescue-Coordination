spring.application.name=Flood Rescue Coordination

server.port=${PORT:8080}
server.servlet.context-path=/api/v1
server.forward-headers-strategy=framework

# --- C?u hình Datasource cho MySQL ---
# L?u ý: N?u ch?y Docker, DB_URL th??ng là jdbc:mysql://db:3306/flood_rescue_coordination
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flood_rescue_coordination?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password_here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate (?ã chuy?n sang MySQL Dialect) ---
# ??i sang 'update' n?u b?n mu?n Hibernate t? t?o b?ng, 'none' n?u b?n ?ã ch?y file SQL th? công
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Quan tr?ng: Ph?i ??i Dialect sang MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# C?u hình ??t tên: Gi? nguyên CamelCase t? Entity sang Table (vì SQL c?a b?n có b?ng tên 'requestImage')
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- Upload Files ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# --- API Keys & Security ---
app.api.vietmap-key=${VIETMAP_API_KEY}
app.api.vietmap-url=https://maps.vietmap.vn/api/
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# --- WebSocket / STOMP ---
spring.messages.stomp.max-buffer-size=512000

cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080/api/v1}

# --- Swagger/OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.rescue.backend.controller.controller
springdoc.swagger-ui.operationsSorter=alpha
