spring.application.name=Flood Rescue Coordination

server.port=${PORT:8080}
server.servlet.context-path=/api/v1
server.forward-headers-strategy=framework

# C?u hýnh Datasource cho SQL Server
# L?u ²: Thay ??i localhost vÓ port 1433 n?u b?n d¨ng instance khßc
spring.datasource.url=${DB_URL?}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Dialect chuy?n sang SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# SQL Server d¨ng UNIQUEIDENTIFIER cho UUID, nÛn ?? Hibernate t? x? l² ho?c mapping qua VARCHAR/GUID
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

app.api.vietmap-key=${VIETMAP_API_KEY}
app.api.vietmap-url=https://maps.vietmap.vn/api/
app.jwt.expiration=${JWT_EXPIRATION}

spring.messages.stomp.max-buffer-size=512000

cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080/api/v1}

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.rescue.backend.controller.controller
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true