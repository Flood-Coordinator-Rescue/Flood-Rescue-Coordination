spring.application.name=Flood Rescue Coordination

server.port=${PORT:8080}
server.servlet.context-path=/api/v1
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flood_rescue_coordination?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password_here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Quan tr?ng: Ph?i ??i Dialect sang MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

app.api.vietmap-key=${VIETMAP_API_KEY}
app.api.vietmap-url=https://maps.vietmap.vn/api/
app.jwt.expiration=${JWT_EXPIRATION:86400000}

spring.messages.stomp.max-buffer-size=512000

cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080/api/v1}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.rescue.backend.controller.controller
springdoc.swagger-ui.operationsSorter=alpha