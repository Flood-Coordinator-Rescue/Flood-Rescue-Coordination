spring.application.name=Flood Rescue Coordination

server.port=${PORT:8080}
server.servlet.context-path=/api/v1
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

app.api.vietmap-key=${VIETMAP_API_KEY}
app.api.vietmap-url=https://maps.vietmap.vn/api/
app.jwt.expiration=${JWT_EXPIRATION}

spring.messages.stomp.max-buffer-size=512000

cloudinary.cloud_name=${CLOUDINARY_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080/api/v1}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.rescue.backend.controller.controller
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true